<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solutions | SmartLife</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script
      type="text\javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
    <script type="text\javascript">
      (function(){
          emailjs.init("UkSAZDqrmMplp5IcO"); //Public for my EmailJs
      })();
    </script>
  </head>

  <body>
    <!-- NAVBAR-->
    <header class="navbar">
      <h1><a href="index.html">smartlife</a></h1>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Dashboard</a>
        <a href="about.html">About</a>
        <a href="solutions.html">Solutions</a>
        <a href="mentorship.html">Mentorship</a>
        <a href="study-hub.html">Study Hub</a>
        <a href="jobs.html">Jobs & Gigs</a>
        <a href="blog.html" class="active"> Blog</a>
      </nav>

      <button class="menu-toggle" id="menuToggle">☰</button>
      <button id="themeToggle">🌙</button>
    </header>

    <div class="no-sidebar">
      <!-- FLOATING CONTACT -->
      <button class="contact-float" id="contactFloat">💬</button>

      <!-- Contact Modal -->
      <div class="contact-modal" id="contactModal">
        <div class="modal-content">
          <span class="close-modal" id="closeModal">&times;</span>
          <h3>Contact SmartLife</h3>

          <form class="contact-form" id="contactForm">
            <input
              type="text"
              name="name"
              placeholder="Your Full Name"
              required
            />
            <input
              type="email"
              name="email"
              placeholder="Your Email"
              required
            />
            <input type="tel" name="tel" placeholder="Your Phone" />
            <input
              type="text"
              name="institution"
              placeholder="Your Institution"
            />
            <label for="level">Year of Study</label>
            <input
              list="years"
              name="years"
              id="year"
              placeholder="--Select an option--"
            />
            <datalist id="years">
              <option value="1st Year"></option>
              <option value="2nd Year"></option>
              <option value="3rd Year"></option>
              <option value="4th Year"></option>
            </datalist>
            <textarea
              name="message"
              placeholder="Your Message"
              required
            ></textarea>
            <button type="submit">Send Message</button>
            <p class="form-status"></p>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="assets/js/script.js"></script>
</html>
